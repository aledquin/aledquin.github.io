<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta
      name="description"
      content="Progressive Reader — EPUB reader with gradual second-language blending (PWA, offline)."
    />
    <title>Progressive Reader · aledquin.github.io</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf8f3;
        --fg: #1a1a1a;
        --muted: #5c5c5c;
        --accent: #2d6a4f;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --fg: #f0ebe3;
          --muted: #a8a29e;
          --accent: #6abf8a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Ubuntu,
          Cantarell,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.55;
      }
      main {
        max-width: 40rem;
        margin: 0 auto;
        padding: clamp(1.5rem, 5vw, 3rem);
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }
      .repo {
        font-size: 0.9rem;
        word-break: break-all;
      }
      a.button {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.65rem 1.25rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 600;
      }
      a.button:hover {
        filter: brightness(1.08);
      }
      a.inline {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Progressive Reader</h1>
      <p>
        Open-source web app (PWA): read EPUBs with progressive English→Spanish blending, offline
        storage, and bundled lexicon support.
      </p>
      <p>
        <a class="button" href="/reader/">Open the app</a>
      </p>
      <p class="repo">
        Source:
        <a
          class="inline"
          href="https://github.com/aledquin/read_books_translate_learning_app"
          rel="noopener noreferrer"
          >aledquin/read_books_translate_learning_app</a
        >
      </p>
    </main>
  </body>
</html>
